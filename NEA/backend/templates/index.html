<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Avoidance</title>
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/> <!--leaflet css-->
    <link rel="stylesheet" href="/static/style.css">
    
</head>
<body>
    <div id="init-airspace-container">
        <div id="init-airspace-content">
            <h2>Initialise Airspace</h2>
            <div class="airspace-input">
                <label for="aircraftCount">Number of aircraft:</label>
                <input type="number" id="aircraftCount" name="aircraftCount" min="1" max="200" value="20" placeholder="Enter a number of aircraft">
                <span class="error" id="error">Please enter a number between 1 and 200</span>
            </div>
            <div id="infoMessage">The aircraft will take a bit of time to load so be patient</div>
            <div class="init-button-container">
                <button class="init-button" id="simButton">
                    Start Simulation
                </button>
            </div>
        </div>
    </div>
    <div id="map"></div>
    <div id="addAircraftButton" title="Add aircraft"><img src="/static/ICONS/airplane.svg"></div>
</body>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
crossorigin=""></script>

<!--  load RotatedMarker plugin from jsdelivr.com due to errors -->
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>

<!-- main javascript file -->
<script src="/static/main.js"></script>
</body>
</html>
</html>
